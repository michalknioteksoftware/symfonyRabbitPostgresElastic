framework:
    messenger:
        # Retry failed messages up to 3 times with exponential backoff
        failure_transport: failed

        transports:
            # AMQP via RabbitMQ (requires ext-amqp)
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
                options:
                    exchange:
                        name: messages
                        type: direct
                    queues:
                        messages: ~

            # Dead-letter transport — uses Doctrine (PostgreSQL) so that
            # messenger:failed:show / messenger:failed:retry work correctly.
            # AMQP does not support those introspection commands.
            failed:
                dsn: 'doctrine://default?queue_name=failed'

        routing:
            App\Message\ExampleMessage: async
            App\Message\ArticlePublishedMessage: async
            # RabbitMQ demo messages
            App\Message\NotificationMessage: async        # always succeeds
            App\Message\ReportGenerationMessage: async    # fails twice, then succeeds
            App\Message\PermanentlyFailingMessage: async  # always fails → dead-letter queue
