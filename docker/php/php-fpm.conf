[www]
; Keep workers alive between requests — avoids the per-request bootstrap
; cost of spawning a new PHP process each time.
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4

; Surface PHP errors in the FPM log so they appear in docker compose logs
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /proc/self/fd/2
