[PHP]
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 60
max_input_vars = 1500
date.timezone = UTC
expose_php = Off

; -----------------------------------------------------------------------
; realpath cache — critical on Windows + Docker Desktop (WSL2 backend).
; Without this, every require/include triggers multiple stat() calls that
; cross the Windows ↔ WSL2 filesystem boundary, costing ~50-100ms each.
; Cache the resolved paths for 10 minutes so stat() is called only once.
; -----------------------------------------------------------------------
realpath_cache_size = 4096k
realpath_cache_ttl = 600

[errors]
error_reporting = E_ALL
display_errors = Off
display_startup_errors = Off
log_errors = On
