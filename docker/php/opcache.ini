[opcache]
opcache.enable = 1
opcache.enable_cli = 0

; -----------------------------------------------------------------------
; revalidate_freq = 2: re-check file modification times at most once every
; 2 seconds instead of on every single request (revalidate_freq=0).
; With volume mounts on Windows each mtime check crosses the filesystem
; boundary. After the first request warms the cache, all subsequent
; requests within the 2s window skip the stat() calls entirely.
; -----------------------------------------------------------------------
opcache.revalidate_freq = 2
opcache.validate_timestamps = 1

opcache.max_accelerated_files = 20000
opcache.memory_consumption = 256
opcache.max_wasted_percentage = 10
opcache.interned_strings_buffer = 16
opcache.fast_shutdown = 1
